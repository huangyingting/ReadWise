name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly full run (fast checks + unit + build + db + E2E) for release-readiness.
  schedule:
    - cron: "0 6 * * *"
  # Allow on-demand runs (e.g. to trigger the tiered E2E job from the UI).
  workflow_dispatch:

# Cancel superseded PR runs to save minutes; never cancel main/schedule runs so
# post-merge and nightly signal is always recorded.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Tiers (see docs/platform/ci.md):
#   fast-checks       — typecheck + lint          (every PR, fails fast)
#   unit-tests        — npm test                  (every PR)
#   build             — npm run build             (every PR)
#   db-integration    — PostgreSQL migrate/test   (every PR)
#   supply-chain      — lockfile + npm audit      (every PR; audit is advisory)
#   dependency-review — new-dep vulnerability scan (PRs only, blocks on HIGH)
#   e2e-smoke         — Playwright smoke          (push to main + nightly + manual; NOT on PRs)
#   ci-summary        — writes a pass/fail digest to the run summary
#
# Required per-PR gates: fast-checks, unit-tests, build, db-integration, supply-chain.
# dependency-review is PR-only but does NOT feed ci-summary (it runs in parallel).
# E2E is intentionally tiered off PRs so a slower/flakier browser run can never
# block a merge — it still runs post-merge, nightly, and on demand.

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1 — Fast checks: typecheck + lint. Cheapest gate, runs first so trivial
  # type/lint mistakes surface in ~1 minute without waiting on a build.
  # ---------------------------------------------------------------------------
  fast-checks:
    name: Fast checks (typecheck + lint)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # -----------------------------------------------------------------------
      # API catalog drift check: regenerate the catalog from route source and
      # fail if the committed artifacts are stale.  The generator is pure static
      # analysis and needs no database or environment secrets.  It is also
      # idempotent — if no routes changed, it leaves the existing timestamps in
      # place so git diff stays clean.
      # Fix: run `npm run api-catalog` locally and commit the updated files.
      # -----------------------------------------------------------------------
      - name: API catalog drift check
        run: |
          npm run api-catalog
          if ! git diff --exit-code docs/platform/api-catalog.json docs/platform/api-catalog.md; then
            echo ""
            echo "❌  API catalog is out of date."
            echo "    The committed catalog does not match what the generator"
            echo "    produces from the current route files."
            echo ""
            echo "    Fix: run the following command and commit the result:"
            echo "      npm run api-catalog"
            echo "    Affected files:"
            echo "      docs/platform/api-catalog.json"
            echo "      docs/platform/api-catalog.md"
            exit 1
          fi
          echo "✅  API catalog is up to date — no drift detected."

  # ---------------------------------------------------------------------------
  # Tier 2 — Unit tests: the Node built-in test runner. These are DB-free (they
  # mock @/lib/prisma) so no migration step is needed; only the generated client.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Tier 3 — Build: the production Next.js build. Runs the SQLite migrations so
  # any statically-generated route that reads the database has a real schema.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      # -----------------------------------------------------------------------
      # Minimal environment required so Next.js build and Prisma succeed.
      # Real secrets are never stored here — use repository secrets for prod.
      # Azure / OAuth provider vars are intentionally absent: features degrade
      # gracefully when unconfigured (isAiConfigured / isSpeechConfigured).
      # -----------------------------------------------------------------------
      DATABASE_URL: file:./ci.db
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      # Ensure no stale .next/ from a previous run (e.g. a cached workspace) can
      # race with the new build and cause PageNotFoundError (#83). The dev server
      # and a production build share .next/, so always start the build clean.
      - name: Clean build cache
        run: rm -rf .next

      - name: Build
        run: npm run build

      - name: Build failure diagnosis
        if: failure()
        run: |
          {
            echo "### ❌ Build failed"
            echo ""
            echo "Common causes:"
            echo "- Stale \`.next/\` cache racing with the build (#83). This job runs \`rm -rf .next\` first; reproduce locally the same way."
            echo "- Type or import errors that only surface during \`next build\`."
            echo ""
            echo "Reproduce locally:"
            echo '```bash'
            echo "export DATABASE_URL=file:./ci.db NEXTAUTH_SECRET=dev NEXTAUTH_URL=http://localhost:3000"
            echo "npm ci && npx prisma generate && npx prisma migrate deploy"
            echo "rm -rf .next && npm run build"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Tier 4 — Database integration: real PostgreSQL migrate + integration tests.
  # ---------------------------------------------------------------------------
  db-integration:
    name: PostgreSQL Migrate / Integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: readwise_test
          POSTGRES_USER: readwise
          POSTGRES_PASSWORD: readwise-ci-password
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd "pg_isready -U readwise -d readwise_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://readwise:readwise-ci-password@localhost:5432/readwise_test?schema=public
      PRISMA_SCHEMA_PATH: prisma/postgresql/schema.prisma
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate PostgreSQL Prisma client
        run: npm run prisma:generate:pg

      - name: Apply PostgreSQL migrations
        run: npm run prisma:migrate:pg

      - name: Check PostgreSQL migration status
        run: npx prisma migrate status --schema prisma/postgresql/schema.prisma

      - name: Run PostgreSQL integration tests
        run: npm run test:db

  # ---------------------------------------------------------------------------
  # Tier 5 — Supply-chain hygiene: lockfile integrity + npm audit.
  #
  # Two checks in one lightweight job:
  #
  # 1. Lockfile integrity — `npm ci` fails fast if package-lock.json is absent
  #    or inconsistent with package.json (e.g. someone edited package.json without
  #    running `npm install`). This is the deterministic, zero-false-positive gate.
  #
  # 2. npm audit (HIGH/CRITICAL, advisory) — reports known vulnerabilities at
  #    high or critical severity.  `continue-on-error: true` is intentional: the
  #    repo currently carries pre-existing transitive advisories that cannot be
  #    fixed without breaking changes (see docs/platform/supply-chain.md).
  #    The step ALWAYS runs and its output is visible in the job log and the run
  #    summary so engineers can triage.  Once all pre-existing HIGH advisories
  #    are remediated, flip this to `continue-on-error: false` to make it blocking.
  #
  # See docs/platform/supply-chain.md for the full policy, severity table, and
  # how to triage or allowlist an advisory.
  # ---------------------------------------------------------------------------
  supply-chain:
    name: Supply-chain hygiene (lockfile + audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      # -----------------------------------------------------------------------
      # Lockfile integrity: npm ci fails if package-lock.json is missing or if
      # it does not satisfy the version ranges in package.json.  This is a hard
      # blocking gate — a drifted lockfile must be fixed before merging.
      # Fix: run `npm install` locally (do NOT use --force) and commit the
      # updated package-lock.json.
      # -----------------------------------------------------------------------
      - name: Lockfile integrity check (npm ci)
        run: npm ci --ignore-scripts

      # -----------------------------------------------------------------------
      # npm audit — advisory (continue-on-error: true) until pre-existing
      # HIGH advisories in @opentelemetry packages are remediated upstream.
      # To promote to blocking: remove the continue-on-error line below.
      # -----------------------------------------------------------------------
      - name: npm audit (HIGH/CRITICAL — advisory)
        run: |
          echo "## npm audit report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if npm audit --audit-level=high 2>&1 | tee audit-output.txt; then
            echo "✅ No HIGH or CRITICAL vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ HIGH or CRITICAL advisories detected (advisory-only — see supply-chain.md to triage):" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -30 audit-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true  # Remove when pre-existing HIGH advisories are resolved.

  # ---------------------------------------------------------------------------
  # Dependency review — compares newly introduced npm packages against the
  # GitHub Advisory Database.  Runs on pull_request only (requires a diff).
  # Blocks the PR if a newly added or updated dependency carries a HIGH or
  # CRITICAL known vulnerability.  Does NOT scan pre-existing transitive deps
  # (that is the job of supply-chain / npm audit above).
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency review (new deps)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ---------------------------------------------------------------------------
  # Tier 6 — E2E smoke (Playwright). Slower/flakier, so it is TIERED: it runs on
  # pushes to main, the nightly schedule, and manual dispatch — never on pull
  # requests. That keeps PR feedback fast and means a browser run can never block
  # a merge, while still giving post-merge and nightly confidence.
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}

    env:
      DATABASE_URL: file:./e2e.db
      NEXTAUTH_SECRET: readwise-playwright-smoke-secret
      NEXTAUTH_URL: http://127.0.0.1:3100
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      # Cache the downloaded browser binaries keyed on the Playwright version so
      # we only re-download Chromium when the dependency changes.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Always run install: on a cache hit this is fast (binaries present) and
      # still installs the OS-level libraries Chromium needs (--with-deps).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Digest — writes a concise pass/fail checklist of the required PR gates to the
  # run summary. Informational only (always exits 0); the individual jobs above
  # remain the gating checks.
  # ---------------------------------------------------------------------------
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [fast-checks, unit-tests, build, db-integration, supply-chain]
    if: ${{ always() }}

    steps:
      - name: Write gate summary
        env:
          FAST_CHECKS: ${{ needs.fast-checks.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          BUILD: ${{ needs.build.result }}
          DB_INTEGRATION: ${{ needs.db-integration.result }}
          SUPPLY_CHAIN: ${{ needs.supply-chain.result }}
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "🚫" ;;
              skipped) echo "⏭️" ;;
              *) echo "❔" ;;
            esac
          }
          {
            echo "## CI quality gates"
            echo ""
            echo "Event: \`${{ github.event_name }}\` · Ref: \`${{ github.ref_name }}\`"
            echo ""
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| Fast checks (typecheck + lint) | $(icon "$FAST_CHECKS") $FAST_CHECKS |"
            echo "| Unit tests | $(icon "$UNIT_TESTS") $UNIT_TESTS |"
            echo "| Build | $(icon "$BUILD") $BUILD |"
            echo "| PostgreSQL migrate / integration | $(icon "$DB_INTEGRATION") $DB_INTEGRATION |"
            echo "| Supply-chain hygiene (lockfile + audit) | $(icon "$SUPPLY_CHAIN") $SUPPLY_CHAIN |"
            echo ""
            if [ "$FAST_CHECKS" = "success" ] && [ "$UNIT_TESTS" = "success" ] && [ "$BUILD" = "success" ] && [ "$DB_INTEGRATION" = "success" ] && [ "$SUPPLY_CHAIN" = "success" ]; then
              echo "All required gates passed. ✅"
            else
              echo "One or more required gates did not pass — see the table above and the failing job's logs."
            fi
            echo ""
            echo "_E2E smoke is tiered (push to main + nightly + manual) and does not run on PRs._"
            echo "_Dependency review runs on PRs only and is not included in this summary._"
            echo "_npm audit in supply-chain is advisory until pre-existing HIGH advisories are resolved._"
          } >> "$GITHUB_STEP_SUMMARY"
