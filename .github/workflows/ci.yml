name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest

    env:
      # -----------------------------------------------------------------------
      # Minimal environment required so Next.js build and Prisma succeed.
      # Real secrets are never stored here — use repository secrets for prod.
      # -----------------------------------------------------------------------
      DATABASE_URL: file:./ci.db
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000
      # NODE_ENV is set automatically by the build step
      # Azure / OAuth provider vars are intentionally absent: features degrade
      # gracefully when unconfigured (isAiConfigured / isSpeechConfigured).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build is the primary gating step: it runs last so typecheck/lint/test
      # failures are visible before a potentially slow build is aborted.
      # Ensure no stale .next/ from a previous run (e.g. a cached workspace)
      # can race with the new build and cause PageNotFoundError (#83).
      - name: Clean build cache
        run: rm -rf .next

      - name: Build
        run: npm run build

  db-integration:
    name: PostgreSQL Migrate / Integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: readwise_test
          POSTGRES_USER: readwise
          POSTGRES_PASSWORD: readwise-ci-password
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd "pg_isready -U readwise -d readwise_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://readwise:readwise-ci-password@localhost:5432/readwise_test?schema=public
      PRISMA_SCHEMA_PATH: prisma/postgresql/schema.prisma
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate PostgreSQL Prisma client
        run: npm run prisma:generate:pg

      - name: Apply PostgreSQL migrations
        run: npm run prisma:migrate:pg

      - name: Check PostgreSQL migration status
        run: npx prisma migrate status --schema prisma/postgresql/schema.prisma

      - name: Run PostgreSQL integration tests
        run: npm run test:db
