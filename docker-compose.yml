services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readwise
      POSTGRES_USER: readwise
      POSTGRES_PASSWORD: readwise-dev-password
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - readwise-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readwise -d readwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  readwise-postgres-data:
