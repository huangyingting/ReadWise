<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline | ReadWise</title>
  <style>
    :root { --primary: #4f46e5; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #111827;
      padding: 2rem;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: #fff;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.75rem;
    }
    p { font-size: 1rem; line-height: 1.6; color: #6b7280; margin-bottom: 1.5rem; }
    button {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📖</div>
    <h1>You're offline</h1>
    <p>ReadWise couldn't reach the internet. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
